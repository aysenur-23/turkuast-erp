  <script>
    function checkBrowserSupport() {
      const requiredFeatures = {
        'Promise': typeof Promise !== 'undefined',
        'fetch': typeof fetch !== 'undefined',
        'localStorage': typeof Storage !== 'undefined',
        'ES6 Classes': (function () {
          try {
            eval('class Test {}');
            return true;
          } catch (e) {
            return false;
          }
        })(),
        'Arrow Functions': (function () {
          try {
            eval('(() => {})');
            return true;
          } catch (e) {
            return false;
          }
        })(),
        'Modules': 'noModule' in HTMLScriptElement.prototype
      };

      const unsupported = Object.entries(requiredFeatures)
        .filter(([_, supported]) => !supported)
        .map(([feature]) => feature);

      if (unsupported.length > 0) {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.innerHTML = `

                <p style="margin-bottom: 12px; font-size: 14px;">Tarayıcınız aşağıdaki özellikleri desteklemiyor:</p>
                <ul style="list-style: none; padding: 0; margin-bottom: 20px; font-size: 12px;">

                <p style="font-size: 14px; margin-bottom: 16px;">Lütfen güncel bir tarayıcı kullanın:</p>

                  <a href="https://www.apple.com/safari/" target="_blank" style="color: white; text-decoration: underline;">Safari</a>
                </div>
              </div>
            `;
        }
        return false;
      }
      return true;
    }

    if (!checkBrowserSupport()) {
      throw new Error('Browser does not support required features');
    }
  </script>

  <!-- Loading Screen Removal Script -->
  <script>
    function removeLoadingScreen() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(function () {
          if (loadingScreen.parentNode) {
            loadingScreen.remove();
          }
        }, 500);
      }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(removeLoadingScreen, 300);
    } else {
      window.addEventListener('load', function () {
        setTimeout(removeLoadingScreen, 300);
      });

      document.addEventListener('DOMContentLoaded', function () {
        setTimeout(removeLoadingScreen, 300);
      });
    }

    setTimeout(function () {
      removeLoadingScreen();
    }, 10000);

    setTimeout(function () {
      const root = document.getElementById('root');
      if (root && root.children.length === 0) {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
